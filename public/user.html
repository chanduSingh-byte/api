<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic API Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-6 md:p-12 font-sans text-slate-800">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <header class="flex items-center justify-between bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">System Dashboard</h1>
                <p id="api-message" class="text-slate-500 text-sm mt-1">Fetching data from API...</p>
            </div>
            <span id="status-badge" class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-sm font-semibold border border-yellow-200">
                Loading...
            </span>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-semibold border-b pb-3 mb-4 flex items-center gap-2">
                    🖥️ Client Information
                </h2>
                <div class="space-y-3 text-sm">
                    <div class="flex justify-between border-b border-slate-100 pb-2">
                        <span class="text-slate-500 font-medium">IP Address:</span>
                        <span id="client-ip" class="font-mono text-slate-900 bg-slate-100 px-2 rounded">...</span>
                    </div>
                    <div class="flex justify-between border-b border-slate-100 pb-2">
                        <span class="text-slate-500 font-medium">Method:</span>
                        <span id="client-method" class="font-semibold text-blue-600">...</span>
                    </div>
                    <div class="flex justify-between border-b border-slate-100 pb-2">
                        <span class="text-slate-500 font-medium">URL Path:</span>
                        <span id="client-url" class="text-slate-900">...</span>
                    </div>
                    <div class="flex flex-col pt-1">
                        <span class="text-slate-500 font-medium mb-1">User Agent:</span>
                        <span id="client-ua" class="text-xs text-slate-600 bg-slate-50 p-2 rounded border border-slate-100 break-words">
                            ...
                        </span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-semibold border-b pb-3 mb-4 flex items-center gap-2">
                    ⚙️ Server Information
                </h2>
                <div class="space-y-3 text-sm">
                    <div class="flex justify-between border-b border-slate-100 pb-2">
                        <span class="text-slate-500 font-medium">OS Platform:</span>
                        <span id="server-os" class="text-slate-900 capitalize">...</span>
                    </div>
                    <div class="flex justify-between border-b border-slate-100 pb-2">
                        <span class="text-slate-500 font-medium">OS Release:</span>
                        <span id="server-release" class="text-slate-900">...</span>
                    </div>
                    <div class="flex justify-between border-b border-slate-100 pb-2">
                        <span class="text-slate-500 font-medium">Node Version:</span>
                        <span id="server-node" class="text-slate-900 font-mono">...</span>
                    </div>
                    <div class="flex justify-between border-b border-slate-100 pb-2">
                        <span class="text-slate-500 font-medium">Uptime:</span>
                        <span id="server-uptime" class="text-slate-900">...</span>
                    </div>
                    
                    <div class="pt-2">
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-slate-500 font-medium">RAM Usage</span>
                            <span id="ram-text" class="text-slate-700 font-semibold">...</span>
                        </div>
                        <div class="w-full bg-slate-200 rounded-full h-2.5">
                            <div id="ram-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-200">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    👥 User Data
                </h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-slate-600">
                    <thead class="text-xs text-slate-700 uppercase bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th scope="col" class="px-6 py-4">ID</th>
                            <th scope="col" class="px-6 py-4">Name</th>
                            <th scope="col" class="px-6 py-4 text-right">Status</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <tr>
                            <td colspan="3" class="px-6 py-4 text-center text-slate-500">Loading data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Aapke backend API ka URL
        // const API_URL = 'http://localhost:5000/api/data';
        const API_URL = 'https://api-dcx0.onrender.com/api/data';

        async function fetchDashboardData() {
            try {
                // 1. Fetch data from API
                const response = await fetch(API_URL);
                const result = await response.json();

                if (result.success) {
                    // Update Header Status
                    document.getElementById('api-message').textContent = result.message;
                    const statusBadge = document.getElementById('status-badge');
                    statusBadge.textContent = 'Connected';
                    statusBadge.className = 'bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-semibold border border-green-200';

                    // 2. Update Client Info
                    document.getElementById('client-ip').textContent = result.client_info.ip_address;
                    document.getElementById('client-method').textContent = result.client_info.method;
                    document.getElementById('client-url').textContent = result.client_info.url_path;
                    document.getElementById('client-ua').textContent = result.client_info.user_agent;

                    // 3. Update Server Info
                    document.getElementById('server-os').textContent = `${result.server_info.os_platform} (${result.server_info.cpu_architecture})`;
                    document.getElementById('server-release').textContent = result.server_info.os_release;
                    document.getElementById('server-node').textContent = result.server_info.node_version;
                    document.getElementById('server-uptime').textContent = `${result.server_info.uptime_seconds} seconds`;

                    // RAM Calculation & Progress Bar
                    const totalRam = result.server_info.total_ram_mb;
                    const freeRam = result.server_info.free_ram_mb;
                    const usedRam = totalRam - freeRam;
                    const ramPercentage = (usedRam / totalRam) * 100;
                    
                    document.getElementById('ram-text').textContent = `${freeRam} MB Free / ${totalRam} MB Total`;
                    document.getElementById('ram-bar').style.width = `${ramPercentage}%`;

                    // 4. Update Table Data
                    const tableBody = document.getElementById('user-table-body');
                    tableBody.innerHTML = ''; // Clear loading text

                    result.data.forEach(user => {
                        // Status badge ke colors decide karna
                        const isApprove = user.status === 'active';
                        const badgeClass = isApprove 
                            ? 'bg-green-100 text-green-700' 
                            : 'bg-slate-100 text-slate-600';

                        // Row create karna
                        const row = `
                            <tr class="bg-white border-b border-slate-100 hover:bg-slate-50">
                                <td class="px-6 py-4 font-medium text-slate-900">#${user.id}</td>
                                <td class="px-6 py-4">${user.name}</td>
                                <td class="px-6 py-4 text-right">
                                    <span class="${badgeClass} px-3 py-1 rounded-full text-xs font-semibold capitalize">${user.status}</span>
                                </td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('api-message').textContent = 'Error fetching data. Is the server running?';
                document.getElementById('status-badge').textContent = 'Error';
                document.getElementById('status-badge').className = 'bg-red-100 text-red-700 px-3 py-1 rounded-full text-sm font-semibold border border-red-200';
                document.getElementById('user-table-body').innerHTML = `<tr><td colspan="3" class="px-6 py-4 text-center text-red-500">Failed to load data. Make sure backend on http://localhost:5000 is running.</td></tr>`;
            }
        }

        // Page load hote hi data fetch karna shuru karein
        window.onload = fetchDashboardData;
    </script>
</body>
</html>
